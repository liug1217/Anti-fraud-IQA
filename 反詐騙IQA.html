<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

<title>反詐騙IQA</title>

<style>

/* ===== 最底層背景 ===== */
html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #1100F9;

    overflow: hidden;
    touch-action: none;
}

/* ===== App(保留原本漸層)===== */
.app{
    width: 100%;
    height: 100vh;
    position: relative;

    background: linear-gradient(
        360deg,
        #0091FF 0%,
        #000000 50%,
        #1100FF 100%
    );

    overflow: hidden;
}

/* ===== 字體 ===== */
*{
    font-family: "SF Pro", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
}

input, textarea{
    user-select: text;
    -webkit-user-select: text;
}

button{
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

/* ===== 上移容器 ===== */
.content{
    position: relative;
    transform: translateY(-60px);
}

/* ===== Title ===== */
.title{
    position: absolute;
    left: 20px;
    top: 60px;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 30px;
    font-weight: 1000;
    color: #fff;
    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

.subtitle{
    position: absolute;
    left: 20px;
    top: 106px;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    color: #8C8C8C;
}

/* ===== glass(液態玻璃:模糊+飽和度+折射濾鏡,折射僅 Chrome 系列瀏覽器支援,其他自動退回模糊玻璃)===== */
.glass{
    position: absolute;
    background: rgba(255,255,255,0.1);
    border-radius: 40px;
    backdrop-filter: blur(20px) saturate(160%) url(#liquidGlassRefract);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow:
        0px 4px 4px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 6px rgba(0,0,0,0.12);
}

/* ===== Rectangles ===== */
.rect2{ left: 20px; right: 20px; top: 143px; height: 200px; }
.rect3{ left: 20px; top: 363px; width: calc(50% - 30px); height: 170px; }
.rect4{ right: 20px; top: 363px; width: calc(50% - 30px); height: 170px; }
.rect5{ left: 20px; top: 553px; width: calc(50% - 30px); height: 170px; }
.rect6{ right: 20px; top: 553px; width: calc(50% - 30px); height: 170px; }

/* ===== Bottom Nav(液態玻璃,Rectangle 1)===== */
.rect1{
    position: absolute;
    left: 20px;
    right: 20px;
    bottom: 20px;
    height: 100px;

    background: rgba(255,255,255,0.1);
    border-radius: 50px;

    backdrop-filter: blur(20px) saturate(160%) url(#liquidGlassRefract);
    -webkit-backdrop-filter: blur(20px) saturate(160%);

    border: 1px solid rgba(255,255,255,0.18);

    box-shadow:
        0px 4px 4px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 6px rgba(0,0,0,0.12);
}

/* Frame 1:導覽列裡的圖示/文字群組,永遠水平置中於 Rectangle 1 */
/* Frame 1:導覽列裡的圖示/文字群組,左右永遠留空間,內部間距用 flex 自動調整 */
.nav-frame{
    position: absolute;
    left: 40px;
    right: 40px;
    top: 31px;
    height: 45.5px;

    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
}

.tab{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
}

.tab-icon{
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

.tab-text{
    margin-top: 7px;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 18px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

/* Group 4:我的(含頭像圓形圖示) */
.tab-profile{ cursor: pointer; }
.tab-profile .tab-icon{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8a8a8a, #4a4a4a);
    box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
    font-size: 0;
}

/* 「我的」頁面標題 */
.profile-page-title{
    position: absolute;
    left: 20px;
    top: 60px;
    width: 60px;
    height: 36px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 1000;
    font-size: 30px;
    line-height: 36px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

/* 右上角設定圖示 */
.settings-btn{
    position: absolute;
    right: 20px;
    top: 76px;
    width: 20px;
    height: 20px;
    cursor: pointer;
}

.settings-icon-ring{
    position: absolute;
    left: 4.17%;
    right: 4.17%;
    top: 4.17%;
    bottom: 4.17%;
    border: 2px solid #FFFFFF;
    border-radius: 50%;
    filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
}

/* Rectangle 10:個人資料卡片(液態玻璃) */
.profile-card{
    position: absolute;
    left: 20px;
    right: 20px;
    top: 116px;
    height: 140px;

    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(20px) saturate(160%) url(#liquidGlassRefract);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow:
        0px 4px 4px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 6px rgba(0,0,0,0.12);
    border-radius: 40px;
}

/* 頭像照片 */
.profile-photo{
    position: absolute;
    left: 20px;
    top: 20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;

    background: linear-gradient(135deg, #8a8a8a, #4a4a4a);
    background-size: cover;
    background-position: center;
    filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 姓名 */
.profile-name{
    position: absolute;
    left: 140px;
    top: 20px;
    width: 66px;
    height: 24px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 20px;
    line-height: 24px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    white-space: nowrap;
}

/* ===== Page(第二個框架,沿用首頁同色背景)===== */
.page{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    display: none;

    background: linear-gradient(
        360deg,
        #0091FF 0%,
        #000000 50%,
        #1100FF 100%
    );

    overflow: hidden;
    z-index: 999;
}

.page-header{
    position: absolute;
    left: 0;
    top: 0;
    transform: translateY(-60px);

    cursor: pointer;
}

/* Vector(返回箭頭,用 CSS 繪製,視覺上等同 Figma 的 Vector 路徑) */
.back-arrow{
    position: absolute;
    left: 20px;
    top: 64px;
    width: 10px;
    height: 10px;

    border-left: 2px solid #FFFFFF;
    border-bottom: 2px solid #FFFFFF;
    transform: rotate(45deg);
    filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
}

/* 返回 */
.back-text{
    position: absolute;
    width: 30px;
    height: 18px;
    left: 34px;
    top: 60px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 15px;
    line-height: 18px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

.page-subtitle{
    position: absolute;
    left: 20px;
    top: 106px;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    color: #8C8C8C;
}

/* Rectangle 7(液態玻璃)*/
.rect7{
    position: absolute;
    left: 20px;
    right: 20px;
    height: 400px;
    top: 278px;
    transform: translateY(-60px);

    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(20px) saturate(160%) url(#liquidGlassRefract);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow:
        0px 4px 4px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 6px rgba(0,0,0,0.12);
    border-radius: 40px;
}

/* 🌐 */
.url-icon{
    position: absolute;
    width: 50px;
    height: 50px;
    left: 20px;
    top: 20px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 1000;
    font-size: 50px;
    line-height: 60px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

/* 網址檢查 */
.url-title{
    position: absolute;
    width: 60px;
    height: 18px;
    left: 90px;
    top: 27px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 15px;
    line-height: 18px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

/* 驗證網站安全性 */
.url-subtitle{
    position: absolute;
    width: 70px;
    height: 12px;
    left: 90px;
    top: 50px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 510;
    font-size: 10px;
    line-height: 12px;
    color: #8C8C8C;
}

/* Rectangle 8(液態玻璃)*/
.rect8{
    position: absolute;
    left: 20px;
    right: 20px;
    top: 122px;
    height: 50px;

    background: rgba(217, 217, 217, 0.1);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(20px) saturate(160%) url(#liquidGlassRefract);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow:
        0px 4px 4px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 6px rgba(0,0,0,0.12);
    border-radius: 25px;
}

/* 輸入網址:用 padding 撐出左右間距,右側留空間給確認按鈕 */
.url-input-label{
    position: absolute;
    left: 20px;
    right: 20px;
    top: 122px;
    height: 50px;
    box-sizing: border-box;
    padding-left: 20px;
    padding-right: 20px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 15px;
    line-height: 50px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);

    background: transparent;
    border: none;
    outline: none;
}

.url-input-label::placeholder{
    color: #FFFFFF;
    opacity: 1;
}

/* Rectangle 9 */
.rect9{
    position: absolute;
    width: 70px;
    height: 30px;
    right: 30px;
    top: 132px;

    background: #2949CB;
    box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    border-radius: 18px;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;
    border: none;
}

/* 確認 */
.url-confirm-text{
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 15px;
    line-height: 18px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);

    pointer-events: none;
}

/* ✅ */
.url-result-icon{
    position: absolute;
    width: 30px;
    height: 30px;
    left: 20px;
    top: 192px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 30px;
    line-height: 36px;
    color: #000000;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

/* 本網站已確認為安全網站 */
.url-result-text{
    position: absolute;
    width: 165px;
    height: 18px;
    left: 70px;
    top: 199px;

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 15px;
    line-height: 18px;
    color: #FFFFFF;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
}

.url-result{
    display: none;
}

/* 格式錯誤提示:放在輸入框下方,靠左 20px */
.url-error{
    position: absolute;
    left: 20px;
    top: 178px;
    width: calc(100% - 40px);

    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 13px;
    line-height: 1.3;
    color: #FF6B6B;
    text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);

    display: none;
    white-space: normal;
}

/* ===== Card text ===== */
.icon{
    position: absolute;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    font-weight: 1000;
    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

.text-main{
    position: absolute;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    font-weight: 700;
}

.text-sub{
    position: absolute;
    font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #8C8C8C;
}

/* 降低透明度偏好設定:自動退回純色背景,不套用玻璃效果 */
@media (prefers-reduced-transparency: reduce){
    .glass, .rect1, .rect7, .rect8{
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: rgba(20, 20, 40, 0.9) !important;
    }
}

</style>
</head>

<body>

<!-- ===== 液態玻璃折射濾鏡(僅 Chrome 系列瀏覽器會套用,其他瀏覽器自動退回模糊玻璃)===== -->
<svg width="0" height="0" style="position:absolute;">
    <filter id="liquidGlassRefract" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="7" result="noise"></feTurbulence>
        <feGaussianBlur in="noise" stdDeviation="2" result="softNoise"></feGaussianBlur>
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="6" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
</svg>

<!-- ===== 首頁 ===== -->
<div class="app" id="homePage">

    <div class="content">

        <div class="title">反詐騙IQA</div>
        <div class="subtitle">您的AI反詐騙智能小助手</div>

        <div class="rect2 glass">
            <div class="icon" style="left:20px; top:20px; font-size:80px;">🛡️</div>
            <div class="text-main" style="left:20px; top:115px; font-size:20px;">安全分數 98</div>
            <div class="text-sub" style="left:20px; top:140px; font-size:15px;">今天尚未發現高風險詐騙活動</div>
        </div>

        <div class="rect3 glass">
            <div class="icon" style="left:20px; top:20px; font-size:50px;">💬</div>
            <div class="text-main" style="left:20px; top:115px; font-size:15px;">訊息分析</div>
            <div class="text-sub" style="left:20px; top:140px; font-size:10px;">檢查簡訊與聊天內容</div>
        </div>

        <div class="rect4 glass">
            <div class="icon" style="left:20px; top:20px; font-size:50px;">📞</div>
            <div class="text-main" style="left:20px; top:115px; font-size:15px;">電話查詢</div>
            <div class="text-sub" style="left:20px; top:140px; font-size:10px;">識別可疑來電</div>
        </div>

        <div class="rect5 glass" onclick="openUrlPage()">
            <div class="icon" style="left:20px; top:20px; font-size:50px;">🌐</div>
            <div class="text-main" style="left:20px; top:115px; font-size:15px;">網址檢查</div>
            <div class="text-sub" style="left:20px; top:140px; font-size:10px;">驗證網站安全性</div>
        </div>

        <div class="rect6 glass">
            <div class="icon" style="left:20px; top:20px; font-size:50px;">🚨</div>
            <div class="text-main" style="left:20px; top:115px; font-size:15px;">最新案例</div>
            <div class="text-sub" style="left:20px; top:140px; font-size:10px;">掌握詐騙趨勢</div>
        </div>

    </div>

    <div class="rect1">
        <div class="nav-frame">
            <div class="tab tab-home"><div class="tab-icon">🏠</div><div class="tab-text">首頁</div></div>
            <div class="tab tab-ai"><div class="tab-icon">🤖</div><div class="tab-text">AI</div></div>
            <div class="tab tab-scan"><div class="tab-icon">📷</div><div class="tab-text">掃描</div></div>
            <div class="tab tab-profile" onclick="openProfilePage()"><div class="tab-icon nav-avatar-icon"></div><div class="tab-text">我的</div></div>
        </div>
    </div>

</div>

<!-- ===== 第二個框架:網址檢查頁(與首頁同色背景)===== -->
<div class="page" id="urlPage">

    <div class="page-header" onclick="closeUrlPage()">
        <div class="back-arrow"></div>
        <div class="back-text">返回</div>
    </div>

    <!-- Rectangle 7:全部內容都包在裡面 -->
    <div class="rect7">
        <div class="url-icon">🌐</div>
        <div class="url-title">網址檢查</div>
        <div class="url-subtitle">驗證網站安全性</div>

        <!-- Rectangle 8 -->
        <div class="rect8"></div>
        <input class="url-input-label" id="urlInput" type="url" placeholder="輸入網址" inputmode="url" autocomplete="off" autocapitalize="off">

        <!-- Rectangle 9 -->
        <button class="rect9" id="checkBtn" onclick="checkUrl()">
            <span class="url-confirm-text">確認</span>
        </button>

        <!-- 格式錯誤提示 -->
        <div class="url-error" id="urlError"></div>

        <!-- 檢查結果(假資料模擬)-->
        <div class="url-result" id="urlResult">
            <div class="url-result-icon">✅</div>
            <div class="url-result-text">本網站已確認為安全網站</div>
        </div>
    </div>

</div>

<!-- ===== 第三個框架:我的(與其他框架同色背景)===== -->
<div class="page" id="profilePage">

    <div class="profile-page-title">我的</div>

    <div class="settings-btn">
        <div class="settings-icon-ring"></div>
    </div>

    <!-- Rectangle 10:個人資料卡片 -->
    <div class="profile-card">
        <div class="profile-photo" id="profilePhoto" onclick="document.getElementById('avatarInput').click()"></div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">
        <div class="profile-name">劉 Ｏ 佑</div>
        <div style="position:absolute; left:140px; top:54px; width:195px; height:18px; font-family:'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif; font-style:normal; font-weight:510; font-size:15px; line-height:18px; color:#8C8C8C;">帳號與設定</div>
    </div>

    <!-- 底部導覽列(跟首頁同一個 Rectangle 1 + Frame 1)-->
    <div class="rect1">
        <div class="nav-frame">
            <div class="tab tab-home" onclick="closeProfilePage()" style="cursor:pointer;"><div class="tab-icon">🏠</div><div class="tab-text">首頁</div></div>
            <div class="tab tab-ai"><div class="tab-icon">🤖</div><div class="tab-text">AI</div></div>
            <div class="tab tab-scan"><div class="tab-icon">📷</div><div class="tab-text">掃描</div></div>
            <div class="tab tab-profile"><div class="tab-icon nav-avatar-icon"></div><div class="tab-text">我的</div></div>
        </div>
    </div>

</div>

<script>
function openUrlPage(){
    document.getElementById("urlPage").style.display = "block";
}

function openProfilePage(){
    document.getElementById("profilePage").style.display = "block";
}

function closeProfilePage(){
    document.getElementById("profilePage").style.display = "none";
}

function closeUrlPage(){
    document.getElementById("urlPage").style.display = "none";
    document.getElementById("urlResult").style.display = "none";
    document.getElementById("urlError").style.display = "none";
    const input = document.getElementById("urlInput");
    input.value = "";
    input.style.color = "#FFFFFF";
}

// 驗證是否為真實、格式正確的網址
function isRealUrl(value){
    if(!value) return false;

    // 沒有寫 http(s):// 時,自動補上 https:// 再檢查
    const candidate = /^https?:\/\//i.test(value) ? value : "https://" + value;

    try{
        const parsed = new URL(candidate);
        // 網域必須包含至少一個點,且點後面至少 2 個字母(例如 .com、.tw)
        return /\.[a-zA-Z]{2,}$/.test(parsed.hostname);
    }catch(e){
        return false;
    }
}

function getHostname(value){
    const candidate = /^https?:\/\//i.test(value) ? value : "https://" + value;
    try{
        return new URL(candidate).hostname;
    }catch(e){
        return null;
    }
}

// 用 Google 公開 DNS API 查詢網域是否真的有註冊紀錄(免費、不需要 API key)
async function domainExists(hostname){
    const response = await fetch(
        "https://dns.google/resolve?name=" + encodeURIComponent(hostname) + "&type=A",
        { method: "GET" }
    );
    const data = await response.json();
    // Status 0 代表查詢成功;Answer 陣列有資料代表這個網域真的有 DNS 紀錄
    return data && data.Status === 0 && Array.isArray(data.Answer) && data.Answer.length > 0;
}

async function checkUrl(){
    const input = document.getElementById("urlInput");
    const errorEl = document.getElementById("urlError");
    const resultEl = document.getElementById("urlResult");
    const btn = document.getElementById("checkBtn");
    const value = input.value.trim();

    if(!value){
        errorEl.textContent = "請輸入網址";
        errorEl.style.display = "block";
        resultEl.style.display = "none";
        return;
    }

    if(!isRealUrl(value)){
        errorEl.textContent = "請輸入正確的網址格式,例如 example.com";
        errorEl.style.display = "block";
        resultEl.style.display = "none";
        return;
    }

    const hostname = getHostname(value);

    // 查詢中:暫時鎖住按鈕,避免重複點擊
    errorEl.style.display = "none";
    resultEl.style.display = "none";
    btn.style.opacity = "1";
    btn.disabled = true;

    try{
        const exists = await domainExists(hostname);

        if(!exists){
            errorEl.textContent = "查無此網域紀錄,網址可能不存在";
            errorEl.style.display = "block";
            resultEl.style.display = "none";
        }else{
            // 網域確實存在後,先用假資料模擬安全性檢查結果(之後可換成真實檢查邏輯)
            resultEl.style.display = "block";
        }
    }catch(e){
        errorEl.textContent = "查詢失敗,請檢查網路連線後再試一次";
        errorEl.style.display = "block";
        resultEl.style.display = "none";
    }finally{
        btn.style.opacity = "1";
        btn.disabled = false;
        input.style.color = "#FFFFFF";
    }
}

document.addEventListener("DOMContentLoaded", function(){
    const input = document.getElementById("urlInput");
    if(input){
        input.addEventListener("input", function(){
            document.getElementById("urlError").style.display = "none";
            input.style.color = "#FFFFFF";
        });

        // 防止手機鍵盤跳出時,瀏覽器自動把畫面往上捲動
        function resetScroll(){
            window.scrollTo(0, 0);
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        }

        input.addEventListener("focus", function(){
            resetScroll();
            setTimeout(resetScroll, 50);
            setTimeout(resetScroll, 300);
        });

        input.addEventListener("blur", resetScroll);
    }

    // 頭像上傳:選擇圖片後讀取並顯示在頭像圓框裡
    const avatarInput = document.getElementById("avatarInput");
    const profilePhoto = document.getElementById("profilePhoto");
    if(avatarInput && profilePhoto){
        avatarInput.addEventListener("change", function(){
            const file = avatarInput.files && avatarInput.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e){
                const imgCss = "url('" + e.target.result + "') center/cover no-repeat";
                profilePhoto.style.background = imgCss;

                // 同步更新底部導覽列「我的」圖示(首頁跟我的頁面各有一份)
                document.querySelectorAll(".nav-avatar-icon").forEach(function(icon){
                    icon.style.background = imgCss;
                });
            };
            reader.readAsDataURL(file);
        });
    }
});
</script>
