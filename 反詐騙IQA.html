<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>反詐騙IQA</title>

<style>

html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body{
    background: #000;
}

/* ===== App ===== */
.app{
    width: 100%;
    height: 100vh;

    position: relative;

    background: linear-gradient(
        360deg,
        #0091FF 0%,
        #000000 49.52%,
        #1100FF 100%
    );

    overflow: hidden;
}

/* ===== 字體 ===== */
*{
    font-family: "SF Pro", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== Title ===== */
.title{
    position: absolute;
    left: 20px;
    top: 60px;

    font-size: 30px;
    font-weight: 1000;
    color: white;

    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

.subtitle{
    position: absolute;
    left: 20px;
    top: 106px;

    font-size: 15px;
    color: #8C8C8C;
}

/* ===== glass ===== */
.glass{
    position: absolute;
    background: rgba(255,255,255,0.1);
    border-radius: 40px;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.18);

    box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
}

/* ===== Rectangles ===== */
.rect2{
    left: 20px;
    right: 20px;
    top: 143px;
    height: 200px;
}

.rect3{
    left: 20px;
    top: 363px;
    width: calc(50% - 30px);
    height: 170px;
}

.rect4{
    right: 20px;
    top: 363px;
    width: calc(50% - 30px);
    height: 170px;
}

.rect5{
    left: 20px;
    top: 553px;
    width: calc(50% - 30px);
    height: 170px;
}

.rect6{
    right: 20px;
    top: 553px;
    width: calc(50% - 30px);
    height: 170px;
}

/* ===== Rectangle 1 (Frame 1 Bottom Nav) ===== */
.rect1{
    position: absolute;

    left: 20px;
    right: 20px;
    bottom: 20px;

    height: 90px;

    background: rgba(255,255,255,0.1);
    border-radius: 50px;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.18);

    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;

    box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

/* ===== Group (Tab Item) ===== */
.tab{
    width: 30px;
    height: 43px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;

    position: relative;

    color: white;
}

/* icon */
.tab-icon{
    font-size: 18px;
}

/* text */
.tab-text{
    position: absolute;
    top: 25px;

    font-size: 15px;
    color: #fff;

    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

/* ===== Card Text ===== */
.icon{
    position: absolute;
    color: white;
    font-weight: 1000;
    text-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

.text-main{
    position: absolute;
    color: white;
    font-weight: 700;
}

.text-sub{
    position: absolute;
    color: #8C8C8C;
}

</style>
</head>

<body>

<div class="app">

    <!-- Title -->
    <div class="title">反詐騙IQA</div>
    <div class="subtitle">您的AI反詐騙智能小助手</div>

    <!-- Rect2 -->
    <div class="rect2 glass">
        <div class="icon" style="left:20px; top:20px; font-size:80px;">🛡️</div>
        <div class="text-main" style="left:20px; top:115px; font-size:20px;">安全分數 98</div>
        <div class="text-sub" style="left:20px; top:140px; font-size:15px;">今天尚未發現高風險詐騙活動</div>
    </div>

    <!-- Rect3 -->
    <div class="rect3 glass">
        <div class="icon" style="left:20px; top:20px; font-size:50px;">💬</div>
        <div class="text-main" style="left:20px; top:115px; font-size:15px;">訊息分析</div>
        <div class="text-sub" style="left:20px; top:140px; font-size:10px;">檢查簡訊與聊天內容</div>
    </div>

    <!-- Rect4 -->
    <div class="rect4 glass">
        <div class="icon" style="left:20px; top:20px; font-size:50px;">📞</div>
        <div class="text-main" style="left:20px; top:115px; font-size:15px;">電話查詢</div>
        <div class="text-sub" style="left:20px; top:140px; font-size:10px;">識別可疑來電</div>
    </div>

    <!-- Rect5 -->
    <div class="rect5 glass">
        <div class="icon" style="left:20px; top:20px; font-size:50px;">🌐</div>
        <div class="text-main" style="left:20px; top:115px; font-size:15px;">網址檢查</div>
        <div class="text-sub" style="left:20px; top:140px; font-size:10px;">驗證網站安全性</div>
    </div>

    <!-- Rect6 -->
    <div class="rect6 glass">
        <div class="icon" style="left:20px; top:20px; font-size:50px;">🚨</div>
        <div class="text-main" style="left:20px; top:115px; font-size:15px;">最新案例</div>
        <div class="text-sub" style="left:20px; top:140px; font-size:10px;">掌握詐騙趨勢</div>
    </div>

    <!-- Frame 1 / Rectangle 1 -->
    <div class="rect1">

        <!-- Group 1 -->
        <div class="tab">
            <div class="tab-icon">🏠</div>
            <div class="tab-text">首頁</div>
        </div>

        <!-- Group 2 -->
        <div class="tab">
            <div class="tab-icon">🤖</div>
            <div class="tab-text">AI</div>
        </div>

        <!-- Group 3 -->
        <div class="tab">
            <div class="tab-icon">📷</div>
            <div class="tab-text">掃描</div>
        </div>

        <!-- Group 4 -->
        <div class="tab">
            <div class="tab-icon">👤</div>
            <div class="tab-text">我的</div>
        </div>

    </div>

</div>

</body>
</html>
