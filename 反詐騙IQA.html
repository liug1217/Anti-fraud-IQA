<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反詐騙IQA</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#1100F9;
}

*{
    font-family:"SF Pro",-apple-system,BlinkMacSystemFont,sans-serif;
    box-sizing:border-box;
}

.app{
    width:100%;
    height:100vh;
    position:relative;
    background:linear-gradient(360deg,#0091FF 0%,#000000 50%,#1100FF 100%);
    overflow:hidden;
}

.content{
    position:relative;
    transform:translateY(-60px);
}

.title{
    position:absolute;
    left:20px;
    top:60px;
    font-size:30px;
    font-weight:1000;
    color:#fff;
    text-shadow:0 4px 4px rgba(0,0,0,.25);
}

.subtitle{
    position:absolute;
    left:20px;
    top:106px;
    font-size:15px;
    color:#8C8C8C;
}

/* ===== 卡片 ===== */
.glass{
    position:absolute;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    border-radius:40px;
}

.rect2{ left:20px; right:20px; top:143px; height:200px; }
.rect3{ left:20px; top:363px; width:calc(50% - 30px); height:170px; }
.rect4{ right:20px; top:363px; width:calc(50% - 30px); height:170px; }
.rect5{ left:20px; top:553px; width:calc(50% - 30px); height:170px; cursor:pointer; }
.rect6{ right:20px; top:553px; width:calc(50% - 30px); height:170px; }

/* ===== 底部 ===== */
.rect1{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;
    height:90px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18);
    border-radius:50px;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.tab{
    display:flex;
    flex-direction:column;
    align-items:center;
    color:#fff;
}

.tab-icon{font-size:18px;}
.tab-text{font-size:12px;margin-top:4px;}

/* ===== URL頁（已刪除所有 rect7/8/9）===== */
.page{
    position:absolute;
    inset:0;
    display:none;
    z-index:999;
    background:linear-gradient(360deg,#0091FF 0%,#000000 50%,#1100FF 100%);
}

.url-icon{
    position:absolute;
    left:40px;
    top:298px;
    font-size:50px;
    color:#fff;
}

.url-title{
    position:absolute;
    left:110px;
    top:305px;
    font-size:15px;
    font-weight:700;
    color:#fff;
}

.url-subtitle{
    position:absolute;
    left:110px;
    top:328px;
    font-size:10px;
    color:#8C8C8C;
}

.input-label{
    position:absolute;
    left:60px;
    top:416px;
    font-size:15px;
    color:#fff;
}

.input-box{
    position:absolute;
    left:40px;
    right:40px;
    top:450px;
    height:50px;
    background:rgba(217,217,217,0.1);
    border-radius:25px;
}

.confirm-btn{
    position:absolute;
    left:340px;
    top:416px;
    font-size:15px;
    color:#fff;
    cursor:pointer;
}

.check-icon{
    position:absolute;
    left:40px;
    top:470px;
    font-size:30px;
}

.check-text{
    position:absolute;
    left:90px;
    top:477px;
    font-size:15px;
    color:#fff;
}
</style>
</head>

<body>

<div class="app">

<div class="content">

    <div class="title">反詐騙IQA</div>
    <div class="subtitle">您的AI反詐騙智能小助手</div>

    <div class="rect2 glass"></div>
    <div class="rect3 glass"></div>
    <div class="rect4 glass"></div>
    <div class="rect5 glass" onclick="openUrlPage()"></div>
    <div class="rect6 glass"></div>

</div>

<div class="rect1">
    <div class="tab">🏠<div class="tab-text">首頁</div></div>
    <div class="tab">🤖<div class="tab-text">AI</div></div>
    <div class="tab">📷<div class="tab-text">掃描</div></div>
    <div class="tab">👤<div class="tab-text">我的</div></div>
</div>

<!-- URL PAGE（乾淨版） -->
<div id="urlPage" class="page">

    <div class="url-icon">🌐</div>
    <div class="url-title">網址檢查</div>
    <div class="url-subtitle">驗證網站安全性</div>

    <div class="input-label">輸入網址</div>
    <div class="input-box"></div>
    <div class="confirm-btn">確認</div>

    <div class="check-icon">✅</div>
    <div class="check-text">本網站已確認為安全網站</div>

</div>

</div>

<script>
function openUrlPage(){
    document.getElementById("urlPage").style.display="block";
}
function closeUrlPage(){
    document.getElementById("urlPage").style.display="none";
}
</script>

</body>
</html>
