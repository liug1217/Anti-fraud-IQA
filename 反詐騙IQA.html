<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反詐騙IQA</title>
<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#1100F9;
}
*{
    font-family:"SF Pro",-apple-system,BlinkMacSystemFont,sans-serif;
    box-sizing:border-box;
}
.app{
    width:100%;
    height:100vh;
    position:relative;
    background:linear-gradient(
        360deg,
        #0091FF 0%,
        #000000 50%,
        #1100FF 100%
    );
    overflow:hidden;
}
.content{
    position:relative;
    transform:translateY(-60px);
}
.title{
    position:absolute;
    left:20px;
    top:60px;
    font-size:30px;
    font-weight:1000;
    color:#fff;
    text-shadow:0 4px 4px rgba(0,0,0,.25);
}
.subtitle{
    position:absolute;
    left:20px;
    top:106px;
    font-size:15px;
    color:#8C8C8C;
}
.glass{
    position:absolute;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    border-radius:40px;
}
.rect2{
    left:20px;
    right:20px;
    top:143px;
    height:200px;
}
.rect3{
    left:20px;
    top:363px;
    width:calc(50% - 30px);
    height:170px;
}
.rect4{
    right:20px;
    top:363px;
    width:calc(50% - 30px);
    height:170px;
}
.rect5{
    left:20px;
    top:553px;
    width:calc(50% - 30px);
    height:170px;
    cursor:pointer;
}
.rect6{
    right:20px;
    top:553px;
    width:calc(50% - 30px);
    height:170px;
}
.rect1{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;
    height:90px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18);
    border-radius:50px;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.tab{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
}
.tab-icon{
    font-size:18px;
}
.tab-text{
    font-size:12px;
    margin-top:4px;
}
.icon{
    position:absolute;
    color:#fff;
    font-weight:1000;
    text-shadow:0 4px 4px rgba(0,0,0,.25);
}
.text-main{
    position:absolute;
    color:#fff;
    font-weight:700;
}
.text-sub{
    position:absolute;
    color:#8C8C8C;
}
/* 網址檢查頁 */
.page{
    position:absolute;
    inset:0;
    display:none;
    background:linear-gradient(
        360deg,
        #0091FF 0%,
        #000000 50%,
        #1100FF 100%
    );
    z-index:999;
}
.page-header{
    position:absolute;
    left:20px;
    top:60px;
    color:#fff;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}
.page-title{
    position:absolute;
    left:20px;
    top:100px;
    color:#fff;
    font-size:30px;
    font-weight:1000;
}
.rect7{
    position:absolute;

    width:400px;
    height:400px;

    left:20px;
    top:278px;

    background:rgba(255,255,255,0.1);

    border-radius:40px;

    box-shadow:0px 4px 4px rgba(0,0,0,0.25);
}

.rect8{
    position:absolute;

    width:360px;
    height:50px;

    left:40px;
    top:400px;

    background:rgba(217,217,217,0.1);

    border-radius:25px;

    box-shadow:0px 4px 4px rgba(0,0,0,0.25);
}

.rect9{
    position:absolute;

    width:70px;
    height:30px;

    left:320px;
    top:410px;

    background:#2949CB;

    border-radius:18px;

    box-shadow:0px 4px 4px rgba(0,0,0,0.25);
}
</style>
</head>
<body>

<div class="app">

<div class="content">

    <div class="title">反詐騙IQA</div>
    <div class="subtitle">您的AI反詐騙智能小助手</div>

    <div class="rect2 glass">
        <div class="icon" style="left:20px;top:20px;font-size:80px;">🛡️</div>
        <div class="text-main" style="left:20px;top:115px;font-size:20px;">安全分數 98</div>
        <div class="text-sub" style="left:20px;top:140px;font-size:15px;">今天尚未發現高風險詐騙活動</div>
    </div>

    <div class="rect3 glass">
        <div class="icon" style="left:20px;top:20px;font-size:50px;">💬</div>
        <div class="text-main" style="left:20px;top:115px;font-size:15px;">訊息分析</div>
        <div class="text-sub" style="left:20px;top:140px;font-size:10px;">檢查簡訊與聊天內容</div>
    </div>

    <div class="rect4 glass">
        <div class="icon" style="left:20px;top:20px;font-size:50px;">📞</div>
        <div class="text-main" style="left:20px;top:115px;font-size:15px;">電話查詢</div>
        <div class="text-sub" style="left:20px;top:140px;font-size:10px;">識別可疑來電</div>
    </div>

    <div class="rect5 glass" onclick="openUrlPage()">
        <div class="icon" style="left:20px;top:20px;font-size:50px;">🌐</div>
        <div class="text-main" style="left:20px;top:115px;font-size:15px;">網址檢查</div>
        <div class="text-sub" style="left:20px;top:140px;font-size:10px;">驗證網站安全性</div>
    </div>

    <div class="rect6 glass">
        <div class="icon" style="left:20px;top:20px;font-size:50px;">🚨</div>
        <div class="text-main" style="left:20px;top:115px;font-size:15px;">最新案例</div>
        <div class="text-sub" style="left:20px;top:140px;font-size:10px;">掌握詐騙趨勢</div>
    </div>

</div>

<div class="rect1">
    <div class="tab">
        <div class="tab-icon">🏠</div>
        <div class="tab-text">首頁</div>
    </div>
    <div class="tab">
        <div class="tab-icon">🤖</div>
        <div class="tab-text">AI</div>
    </div>
    <div class="tab">
        <div class="tab-icon">📷</div>
        <div class="tab-text">掃描</div>
    </div>
    <div class="tab">
        <div class="tab-icon">👤</div>
        <div class="tab-text">我的</div>
    </div>
</div>

<!-- ===== 網址檢查頁 ===== -->

    <!-- Rectangle 7 -->
    <div class="rect7"></div>

    <!-- Rectangle 8 -->
    <div class="rect8"></div>

    <!-- Rectangle 9 -->
    <div class="rect9"></div>

    <div class="url-card"></div>

</div>

</div>

<script>

function openUrlPage(){
    document.getElementById("urlPage").style.display="block";
}

function closeUrlPage(){
    document.getElementById("urlPage").style.display="none";
}

</script>

</body>
</html>
