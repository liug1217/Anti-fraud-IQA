<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>IQA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

html,body{
height:100%;
background:#000;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:500px;
height:100vh;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top,#1b3dff 0%,transparent 40%),
radial-gradient(circle at bottom,#00c2ff 0%,transparent 40%),
#050505;
}

.header{
padding-top:calc(env(safe-area-inset-top) + 24px);
padding-left:24px;
padding-right:24px;
}

.logo{
font-size:42px;
font-weight:800;
color:white;
letter-spacing:-2px;
}

.subtitle{
margin-top:8px;
color:rgba(255,255,255,.7);
font-size:15px;
}

.hero{
margin:24px;
padding:28px;
border-radius:34px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.1);
}

.heroIcon{
font-size:64px;
}

.heroTitle{
margin-top:12px;
font-size:28px;
font-weight:700;
color:white;
}

.heroText{
margin-top:10px;
line-height:1.5;
color:rgba(255,255,255,.65);
}

.grid{
padding:0 24px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
height:150px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(30px);
-webkit-backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.1);

padding:18px;

display:flex;
flex-direction:column;

cursor:pointer;

transition:.25s;
}

.card:active{
transform:scale(.96);
}

.icon{
font-size:32px;
}

.title{
margin-top:auto;
color:white;
font-weight:600;
font-size:17px;
}

.desc{
margin-top:4px;
font-size:12px;
color:rgba(255,255,255,.55);
}

.tabbar{
position:absolute;
left:20px;
right:20px;
bottom:calc(env(safe-area-inset-bottom) + 14px);

height:72px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(40px);
-webkit-backdrop-filter:blur(40px);

border:1px solid rgba(255,255,255,.1);

border-radius:999px;

display:flex;
align-items:center;
justify-content:space-around;
}

.tab{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;

color:rgba(255,255,255,.6);
font-size:12px;
}

.tab.active{
color:white;
}

.scanButton{

position:absolute;

left:50%;
transform:translateX(-50%);

bottom:115px;

width:78px;
height:78px;

border:none;
border-radius:50%;

background:linear-gradient(
135deg,
#00d2ff,
#0066ff
);

color:white;
font-size:34px;

box-shadow:
0 10px 35px rgba(0,120,255,.5);

cursor:pointer;
}

.page{
display:none;
}

.page.active{
display:block;
}

</style>
</head>

<body>

<div class="app">

<div id="home" class="page active">

<div class="header">
<div class="logo">IQA</div>
<div class="subtitle">
AI 反詐騙智能助手
</div>
</div>

<div class="hero">
<div class="heroIcon">🛡️</div>
<div class="heroTitle">
安全分數 98
</div>
<div class="heroText">
今天尚未發現高風險詐騙活動
</div>
</div>

<div class="grid">

<div class="card">
<div class="icon">💬</div>
<div class="title">訊息分析</div>
<div class="desc">檢查簡訊與聊天內容</div>
</div>

<div class="card">
<div class="icon">📞</div>
<div class="title">電話查詢</div>
<div class="desc">識別可疑來電</div>
</div>

<div class="card">
<div class="icon">🌐</div>
<div class="title">網址檢查</div>
<div class="desc">驗證網站安全性</div>
</div>

<div class="card">
<div class="icon">🚨</div>
<div class="title">最新案例</div>
<div class="desc">掌握詐騙趨勢</div>
</div>

</div>

</div>

<button class="scanButton">
✨
</button>

<div class="tabbar">

<div class="tab active">
🏠
<div>首頁</div>
</div>

<div class="tab">
🤖
<div>AI</div>
</div>

<div class="tab">
📊
<div>掃描</div>
</div>

<div class="tab">
👤
<div>我的</div>
</div>

</div>

</div>

</body>
</html>
